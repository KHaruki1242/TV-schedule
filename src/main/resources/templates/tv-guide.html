<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>仙台番組表</title>
	
	
</head>
<body>
    <h1>📺 仙台番組表（テスト）</h1>
	<form th:action="@{/tv/update}" method="post" style="margin-bottom: 20px;">
	        <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
	            最新の仙台番組表を取得する
	        </button>
	    </form>
    <table border="1">
        <thead>
            <tr>
                <th>放送局</th>
                <th>番組名</th>
                <th>開始時間</th>
                <th>内容</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${programs}">
                <td th:text="${p.stationName}"></td>
                <td th:text="${p.title}" style="font-weight: bold;"></td>
                <td th:text="${#temporals.format(p.startTime, 'HH:mm')}"></td>
                <td th:text="${p.description}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
